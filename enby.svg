<svg version="1.1"
     width="300" height="200"
     xmlns="http://www.w3.org/2000/svg">
    <title>Non Binary Pride Flag</title>
    <rect width="100%" height="50" y="0" fill="Yellow" id="first-bar" class="flag-bar ry-flag-bar"/>
    <rect width="100%" height="50" y="50" fill="White" id="second-bar" class="flag-bar ry-flag-bar"/>
    <rect width="100%" height="50" y="100" fill="RebeccaPurple" id="third-bar" class="flag-bar ry-flag-bar"/>
    <rect width="100%" height="50" y="150" fill="#3B3C36" id="fourth-bar" class="flag-bar ry-flag-bar"/>
</svg>